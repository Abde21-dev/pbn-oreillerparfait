name: Deploy Hugo PBN

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # ÉTAPE 1 : BUILD
  # ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hugo-public
          path: ./public

  # ─────────────────────────────────────────
  # ÉTAPE 2A : DEPLOY → GITHUB PAGES
  # ─────────────────────────────────────────
  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: hugo-public
          path: ./public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

  # ─────────────────────────────────────────
  # ÉTAPE 2B : DEPLOY → VERCEL
  # ─────────────────────────────────────────
  deploy-vercel:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: hugo-public
          path: ./public

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel deploy ./public --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────────
  # ÉTAPE 2C : DEPLOY → CLOUDFLARE PAGES
  # ─────────────────────────────────────────
  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: hugo-public
          path: ./public

      - name: Créer le projet Cloudflare Pages si inexistant
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"name":"${{ secrets.CLOUDFLARE_PROJECT_NAME }}","production_branch":"main"}' | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print('Projet créé:', d['result']['name']) if d.get('success') else print('Info:', d.get('errors','projet existant'))"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ./public --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─────────────────────────────────────────
  # ÉTAPE 3 : PING GOOGLE (SEO)
  # ─────────────────────────────────────────
  ping-google:
    needs: [deploy-github-pages, deploy-vercel, deploy-cloudflare]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Ping Google sitemap
        env:
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then
            curl -s "https://www.google.com/ping?sitemap=https://$CUSTOM_DOMAIN/sitemap.xml"
            echo "Sitemap soumis à Google : https://$CUSTOM_DOMAIN/sitemap.xml"
          else
            echo "Pas de domaine custom configuré, ping ignoré."
          fi
